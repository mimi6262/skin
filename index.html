<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 Skin Island</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{
  --sky:#e8f5e8;--grass:#5aaa5a;--grass2:#3d8a3d;
  --sand:#f5e8c8;--sand2:#e8d4a0;
  --cream:#fdf8ee;--cream2:#f5ecd8;
  --brown:#7a5230;--muted:#9a8060;--border:#d4c4a0;
  --teal:#44b8a0;--teal2:#259878;--teal3:#d8f5ee;
  --pink:#f0b0c0;--yellow:#f0d840;--orange:#f0a040;
  --white:#fff;--text:#3a2818;
  --sh:0 3px 12px rgba(60,40,20,.10);
  --sh2:0 6px 24px rgba(60,40,20,.16);
  --r:12px;--r2:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--sky);color:var(--text);
  height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* TOPBAR */
.topbar{height:46px;background:var(--grass);display:flex;align-items:center;
  padding:0 12px;gap:7px;flex-shrink:0;
  box-shadow:0 3px 0 var(--grass2),0 5px 10px rgba(40,80,40,.12);z-index:100}
.logo{font-size:.95rem;font-weight:900;color:#fff;text-shadow:0 2px 4px rgba(30,80,30,.4);
  display:flex;align-items:center;gap:5px;white-space:nowrap;margin-right:4px}
.dv{width:1px;height:20px;background:rgba(255,255,255,.3)}
.tbtn{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.2);
  border:2px solid rgba(255,255,255,.35);border-radius:16px;padding:4px 10px;
  color:#fff;font-size:.7rem;font-weight:700;cursor:pointer;transition:all .15s;
  white-space:nowrap;font-family:'Nunito',sans-serif}
.tbtn:hover{background:rgba(255,255,255,.35);transform:translateY(-1px)}
.tbtn.sv{background:var(--teal);border-color:var(--teal2)}
.tbtn.st{background:#d4a010;border-color:#a07808}
.sp{flex:1}

/* WORKSPACE: left(tools) | center(big editor) | right(AI+thumbs) */
.ws{display:grid;grid-template-columns:168px 1fr 234px;flex:1;overflow:hidden}

/* ──────────── LEFT PANEL ──────────── */
.lp{background:var(--cream);border-right:2px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden}
.lp-hd{background:var(--sand);border-bottom:2px solid var(--border);
  padding:6px 10px;flex-shrink:0;font-size:.6rem;font-weight:800;
  color:var(--muted);letter-spacing:.07em;text-transform:uppercase}
.lp-sc{flex:1;overflow-y:auto;padding:7px}
.lp-sc::-webkit-scrollbar{width:3px}
.lp-sc::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Parts list */
.ghd{font-size:.56rem;font-weight:800;color:var(--muted);letter-spacing:.07em;
  text-transform:uppercase;padding:6px 2px 3px;display:flex;align-items:center;gap:4px}
.ghd::after{content:'';flex:1;height:1px;background:var(--border)}
.pi{display:flex;align-items:center;gap:5px;padding:4px 7px;border-radius:9px;
  cursor:pointer;transition:all .13s;border:2px solid transparent;margin-bottom:2px}
.pi:hover{background:var(--sand)}
.pi.active{background:#fff;border-color:var(--teal);box-shadow:0 1px 5px rgba(68,184,160,.18)}
.pi.has-d{border-left:3px solid var(--teal)}
.pi-ic{font-size:.88rem;width:16px;text-align:center}
.pi-info{flex:1;min-width:0}
.pi-nm{font-size:.68rem;font-weight:700}
.pi-sb{font-size:.55rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-vis{width:17px;height:17px;border-radius:5px;background:none;border:1.5px solid var(--border);
  cursor:pointer;font-size:.62rem;display:flex;align-items:center;justify-content:center;
  color:var(--muted);transition:all .12s;flex-shrink:0}
.pi-vis:hover{border-color:var(--teal);color:var(--teal2)}
.pi-vis.off{opacity:.3}

/* Tool & palette section */
.sec{margin-top:8px}
.sec-t{font-size:.56rem;font-weight:800;color:var(--muted);letter-spacing:.07em;
  text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:4px}
.sec-t::after{content:'';flex:1;height:1px;background:var(--border)}

.trow{display:flex;gap:3px;flex-wrap:wrap}
.t2{width:28px;height:28px;border-radius:7px;border:1.5px solid var(--border);
  background:var(--cream);cursor:pointer;font-size:.82rem;
  display:flex;align-items:center;justify-content:center;transition:all .13s}
.t2:hover{background:var(--sand);border-color:var(--teal)}
.t2.active{background:var(--teal);border-color:var(--teal2);color:#fff}
.t2-sm{width:auto;padding:0 6px;font-size:.58rem;font-weight:700}

/* Palette */
.pg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:5px}
.pc{aspect-ratio:1;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:all .12s}
.pc:hover{transform:scale(1.18);z-index:1}
.pc.sel{border-color:var(--brown);box-shadow:0 1px 4px rgba(0,0,0,.2)}
.cc-row{display:flex;align-items:center;gap:5px;margin-top:5px}
.cc-box{width:26px;height:26px;border-radius:6px;border:2px solid var(--border);cursor:pointer;flex-shrink:0}
.cc-hex{flex:1;border:1.5px solid var(--border);border-radius:6px;padding:3px 6px;
  font-size:.65rem;font-family:'Nunito',sans-serif;color:var(--text);background:var(--cream);outline:none;min-width:0}
.cc-hex:focus{border-color:var(--teal)}
.cc-add{width:22px;height:22px;border-radius:5px;border:1.5px solid var(--border);
  background:var(--cream);cursor:pointer;font-size:.7rem;display:flex;align-items:center;
  justify-content:center;transition:all .12s;flex-shrink:0}
.cc-add:hover{background:var(--teal);border-color:var(--teal2);color:#fff}

/* Presets */
.prg{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:4px}
.prc{border:2px solid var(--border);border-radius:8px;padding:4px 3px;text-align:center;
  cursor:pointer;background:#fff;transition:all .14s;position:relative}
.prc:hover{border-color:var(--teal);transform:translateY(-1px)}
.prc canvas{image-rendering:pixelated;display:block;margin:0 auto 2px;border-radius:3px;border:1px solid var(--border)}
.prc-nm{font-size:.52rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prc-del{position:absolute;top:2px;right:2px;width:12px;height:12px;background:#e04848;
  border:none;border-radius:50%;color:#fff;font-size:.42rem;cursor:pointer;
  display:none;align-items:center;justify-content:center}
.prc:hover .prc-del{display:flex}
.pr-empty{font-size:.6rem;color:var(--muted);text-align:center;padding:8px 2px;
  font-weight:600;grid-column:1/-1;line-height:1.5}

/* ──────────── CENTER PANEL ──────────── */
.cp{display:flex;flex-direction:column;background:var(--sky);overflow:hidden}

/* Mode tabs at top */
.mode-bar{height:38px;background:var(--sand);border-bottom:2px solid var(--border);
  display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0;
  box-shadow:0 2px 6px rgba(60,40,20,.07)}
.mode-tag{font-size:.6rem;font-weight:800;color:var(--muted);margin-right:2px}
.vbtn{padding:4px 11px;border-radius:15px;border:2px solid var(--border);background:#fff;
  color:var(--muted);font-size:.68rem;font-weight:700;cursor:pointer;transition:all .14s;
  font-family:'Nunito',sans-serif}
.vbtn:hover{background:var(--cream);border-color:var(--teal);color:var(--teal2)}
.vbtn.active{background:var(--teal);border-color:var(--teal2);color:#fff;
  box-shadow:0 2px 5px rgba(68,184,160,.25)}
.vbtn.edit-mode{background:var(--orange);border-color:#c07820;color:#fff}
.vbtn.edit-mode:hover{background:#d08010}

/* Face selector (shown in edit mode) */
.face-bar{height:34px;background:var(--cream2);border-bottom:2px solid var(--border);
  display:flex;align-items:center;padding:0 10px;gap:5px;flex-shrink:0;display:none}
.face-bar.show{display:flex}
.face-lbl{font-size:.6rem;font-weight:800;color:var(--muted)}
.fbtn{padding:3px 9px;border-radius:12px;border:2px solid var(--border);background:#fff;
  color:var(--muted);font-size:.65rem;font-weight:700;cursor:pointer;transition:all .13s;
  font-family:'Nunito',sans-serif}
.fbtn:hover{border-color:var(--orange);color:var(--orange)}
.fbtn.active{background:var(--orange);border-color:#c07820;color:#fff}
.zrow{display:flex;align-items:center;gap:4px;margin-left:auto}
.zbtn{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border);
  background:#fff;color:var(--muted);cursor:pointer;font-size:.78rem;
  display:flex;align-items:center;justify-content:center;transition:all .12s;font-family:'Nunito',sans-serif}
.zbtn:hover{background:var(--cream);border-color:var(--teal);color:var(--teal2)}
.zlbl{font-size:.65rem;color:var(--muted);font-weight:700;min-width:24px;text-align:center}

/* Center canvas area */
.cc{flex:1;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden}
.cc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:44px;
  background:linear-gradient(to top,var(--grass) 0%,transparent 100%);
  pointer-events:none;z-index:0}

/* 2D preview canvas */
#c2d{image-rendering:pixelated;position:relative;z-index:1;display:block;border-radius:6px;
  cursor:pointer}
#c2d.edit-cur{cursor:crosshair}

/* Pixel edit canvas (big, overlays center) */
#cEdit{image-rendering:pixelated;position:relative;z-index:2;display:none;
  cursor:crosshair;border-radius:8px;box-shadow:var(--sh2);
  border:3px solid var(--orange)}

/* 3D canvas */
#c3d{position:absolute;inset:0;width:100%!important;height:100%!important;display:none;z-index:1}

/* Checker bg for edit canvas */
.edit-checker{
  display:none;position:absolute;z-index:1;
  background:repeating-conic-gradient(#ddd6c4 0% 25%,#ece5d4 0% 50%) 0 0/12px 12px;
  border-radius:8px;
}
.edit-checker.show{display:block}

.empty{position:absolute;z-index:3;text-align:center;
  background:rgba(255,255,255,.88);border-radius:var(--r2);padding:26px 32px;
  border:3px solid var(--border);box-shadow:var(--sh2)}
.e-ic{font-size:3rem;animation:bob 2s ease-in-out infinite;margin-bottom:9px}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.e-t{font-size:.9rem;font-weight:900;margin-bottom:4px}
.e-s{font-size:.7rem;color:var(--muted);line-height:1.8}

.hint3d{position:absolute;bottom:52px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,.9);border:2px solid var(--border);border-radius:16px;
  padding:4px 12px;font-size:.6rem;color:var(--muted);z-index:5;pointer-events:none;
  display:none;font-weight:600;box-shadow:var(--sh);white-space:nowrap}
.hint3d.on{display:block}

/* Pixel coord display */
.px-info{position:absolute;top:8px;left:8px;z-index:10;
  background:rgba(255,255,255,.88);border:2px solid var(--border);border-radius:8px;
  padding:3px 8px;font-size:.62rem;font-weight:700;color:var(--text);display:none;
  box-shadow:var(--sh);pointer-events:none}
.px-info.show{display:block}

/* ──────────── RIGHT PANEL ──────────── */
.rp{background:var(--cream);border-left:2px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden}
.rp-hd{background:var(--sand);border-bottom:2px solid var(--border);
  padding:6px 10px;flex-shrink:0;font-size:.6rem;font-weight:800;
  color:var(--muted);letter-spacing:.07em;text-transform:uppercase}
.rp-sc{flex:1;overflow-y:auto;padding:8px}
.rp-sc::-webkit-scrollbar{width:3px}
.rp-sc::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.fu{border:2.5px dashed var(--border);border-radius:var(--r);padding:11px;text-align:center;
  cursor:pointer;transition:all .18s;background:#fff;margin-bottom:8px}
.fu:hover{border-color:var(--teal);background:var(--teal3);transform:translateY(-1px)}
.fu input{display:none}
.fu-ic{font-size:1.5rem;margin-bottom:2px}
.fu-t{font-size:.7rem;font-weight:800}
.fu-s{font-size:.58rem;color:var(--muted)}
.fu-ok{font-size:.62rem;color:var(--teal2);font-weight:700;margin-top:3px;display:none}

/* AI box */
.ai-box{background:linear-gradient(135deg,#edfaf5,#e4f4ff);border:2px solid var(--teal);
  border-radius:var(--r);padding:9px;margin-bottom:8px}
.ai-t{font-size:.68rem;font-weight:800;color:var(--teal2);margin-bottom:5px;display:flex;align-items:center;gap:4px}
.ai-ta{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:6px 8px;
  font-size:.7rem;font-family:'Nunito',sans-serif;color:var(--text);background:#fff;
  outline:none;resize:none;min-height:50px;transition:border-color .14s}
.ai-ta:focus{border-color:var(--teal)}
.ai-row{display:flex;gap:4px;margin-top:5px;align-items:center}
.ai-sel{flex:1;border:1.5px solid var(--border);border-radius:7px;padding:4px 6px;
  font-size:.65rem;font-family:'Nunito',sans-serif;color:var(--text);background:#fff;outline:none}
.ai-sel:focus{border-color:var(--teal)}
.ai-btn{background:var(--teal);border:2px solid var(--teal2);border-radius:8px;
  padding:5px 11px;color:#fff;font-size:.67rem;font-weight:800;cursor:pointer;
  transition:all .15s;font-family:'Nunito',sans-serif;white-space:nowrap}
.ai-btn:hover{background:var(--teal2);transform:translateY(-1px)}
.ai-btn:disabled{opacity:.5;cursor:wait;transform:none}
.ai-st{font-size:.58rem;color:var(--muted);margin-top:4px;min-height:12px;font-weight:600;line-height:1.4}

/* Thumbs */
.th-sec{font-size:.58rem;font-weight:800;color:var(--muted);letter-spacing:.07em;
  text-transform:uppercase;margin:7px 0 4px;display:flex;align-items:center;gap:4px}
.th-sec::after{content:'';flex:1;height:1px;background:var(--border)}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.tc{background:#fff;border-radius:9px;border:2px solid var(--border);padding:5px 4px;
  text-align:center;cursor:pointer;transition:all .14s;position:relative}
.tc:hover{border-color:var(--teal);transform:translateY(-1px);box-shadow:var(--sh)}
.tc.active{border-color:var(--teal);box-shadow:0 3px 8px rgba(68,184,160,.2)}
.tc.has-d{border-left:3px solid var(--teal)}
.tc.ovl{border-style:dashed}
.tc canvas{image-rendering:pixelated;display:block;margin:0 auto 2px;border-radius:3px}
.tc-nm{font-size:.56rem;font-weight:700}
.tc-b{position:absolute;top:2px;right:2px;font-size:.44rem;padding:1px 4px;
  border-radius:4px;font-weight:700}
.tc-b.ok{background:rgba(68,184,160,.16);color:var(--teal2)}
.tc-b.no{background:rgba(154,128,96,.1);color:var(--muted)}

.sw{padding:8px;border-top:2px solid var(--border);background:var(--sand);flex-shrink:0}
.sa{width:100%;padding:9px;border-radius:11px;
  background:linear-gradient(135deg,var(--teal),#2a9878);border:none;color:#fff;
  font-size:.75rem;font-weight:800;cursor:pointer;transition:all .17s;
  font-family:'Nunito',sans-serif;box-shadow:0 3px 9px rgba(68,184,160,.28)}
.sa:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(68,184,160,.4)}
.srw{display:flex;gap:5px;margin-top:6px}
.ssm{flex:1;padding:6px;border-radius:8px;background:#fff;border:2px solid var(--border);
  color:var(--muted);font-size:.62rem;font-weight:700;cursor:pointer;transition:all .13s;
  font-family:'Nunito',sans-serif}
.ssm:hover{background:var(--cream);border-color:var(--teal);color:var(--teal2)}

/* Status */
.sbar{height:22px;background:var(--grass);box-shadow:0 -2px 0 var(--grass2);
  display:flex;align-items:center;padding:0 10px;gap:10px;
  font-size:.58rem;color:rgba(255,255,255,.82);font-weight:700;flex-shrink:0}
.sdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.4)}
.sdot.g{background:var(--yellow)}

/* Toast */
.toast{position:fixed;top:54px;left:50%;transform:translateX(-50%) translateY(-14px);
  background:var(--teal);color:#fff;border-radius:16px;padding:6px 16px;
  font-size:.7rem;font-weight:700;opacity:0;transition:all .26s;pointer-events:none;
  z-index:9999;box-shadow:var(--sh2);white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.sp2{display:inline-block;width:11px;height:11px;border:2px solid rgba(255,255,255,.4);
  border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">🍃 Skin Island</div>
  <div class="dv"></div>
  <button class="tbtn" onclick="document.getElementById('fi1').click()">📂 열기</button>
  <input type="file" id="fi1" accept="image/png" style="display:none" onchange="loadFull(this)">
  <button class="tbtn sv" onclick="dlFull()">💾 저장</button>
  <button class="tbtn" onclick="dlParts()">📦 파츠</button>
  <div class="dv"></div>
  <button class="tbtn st" onclick="savePreset()">⭐ 패턴저장</button>
  <button class="tbtn" onclick="undo()">↩️ 되돌리기</button>
  <button class="tbtn" onclick="resetAll()">🔄 초기화</button>
  <div class="sp"></div>
  <span style="font-size:.62rem;color:rgba(255,255,255,.75);font-weight:600">🏝️ 64×64 Java</span>
</div>

<div class="ws">

<!-- ── LEFT ── -->
<div class="lp">
  <div class="lp-hd">파츠 & 도구</div>
  <div class="lp-sc">

    <div id="partsList"></div>

    <!-- Drawing tools -->
    <div class="sec">
      <div class="sec-t">그리기 도구</div>
      <div class="trow">
        <button class="t2 active" id="tb_draw" onclick="setTool('draw',this)" title="펜 (P)">✏️</button>
        <button class="t2" id="tb_fill" onclick="setTool('fill',this)" title="채우기 (F)">🪣</button>
        <button class="t2" id="tb_erase" onclick="setTool('erase',this)" title="지우개 (E)">🧹</button>
        <button class="t2" id="tb_pick" onclick="setTool('pick',this)" title="색상추출 (I)">💉</button>
        <button class="t2 t2-sm" onclick="flipH()" title="좌우반전">↔️</button>
        <button class="t2 t2-sm" onclick="clearPart()" title="파츠 지우기" style="font-size:.6rem">삭제</button>
      </div>
    </div>

    <!-- Palette -->
    <div class="sec">
      <div class="sec-t">팔레트</div>
      <div class="pg" id="palGrid"></div>
      <div class="cc-row">
        <div class="cc-box" id="ccBox" onclick="document.getElementById('cpick').click()"></div>
        <input type="color" id="cpick" style="display:none" onchange="setCol(this.value)">
        <input class="cc-hex" id="cHex" type="text" maxlength="7" onchange="setCol(this.value)">
        <button class="cc-add" onclick="addPal(curCol)" title="추가">＋</button>
      </div>
    </div>

    <!-- Presets -->
    <div class="sec">
      <div class="sec-t">저장된 패턴</div>
      <div class="prg" id="preGrid"></div>
    </div>

  </div>
</div>

<!-- ── CENTER ── -->
<div class="cp">
  <!-- Mode bar -->
  <div class="mode-bar">
    <span class="mode-tag">모드:</span>
    <button class="vbtn active" id="vbPreview" onclick="setMode('preview',this)">👁 미리보기</button>
    <button class="vbtn" id="vbEdit" onclick="setMode('edit',this)">✏️ 픽셀 편집</button>
    <button class="vbtn" id="vb3d" onclick="setMode('3d',this)">🎮 3D</button>
    <div class="dv" style="background:var(--border)"></div>
    <button class="vbtn" id="vbBack" onclick="toggleBack(this)" style="display:none">앞/뒤</button>
    <button class="vbtn" id="gridBtn" onclick="toggleGrid(this)">격자</button>
    <button class="vbtn" id="ovlBtn" onclick="toggleOvl(this)">경계</button>
    <div class="zrow">
      <button class="zbtn" onclick="zoom(-1)">−</button>
      <span class="zlbl" id="zLbl">×6</span>
      <button class="zbtn" onclick="zoom(1)">+</button>
    </div>
  </div>

  <!-- Face selector (edit mode only) -->
  <div class="face-bar" id="faceBar">
    <span class="face-lbl">면 선택:</span>
    <button class="fbtn active" id="fb_front" onclick="setFace('front',this)">앞</button>
    <button class="fbtn" id="fb_back" onclick="setFace('back',this)">뒤</button>
    <button class="fbtn" id="fb_right" onclick="setFace('right',this)">오른쪽</button>

// ════════════════════════════════════════
// THREE.JS
// ════════════════════════════════════════
let T=null;
function init3D(){
  const c3=document.getElementById('c3d');
  const cont=document.getElementById('cc');
  const W=cont.clientWidth,H=cont.clientHeight;
  const renderer=new THREE.WebGLRenderer({canvas:c3,antialias:false,alpha:true});
  renderer.setSize(W,H); renderer.setPixelRatio(window.devicePixelRatio);
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(42,W/H,0.1,100);
  camera.position.set(0,0,5);
  scene.add(new THREE.AmbientLight(0xffffff,0.78));
  const dl=new THREE.DirectionalLight(0xfffbf0,0.88); dl.position.set(3,5,4); scene.add(dl);
  scene.add(Object.assign(new THREE.DirectionalLight(0xd0f0e0,0.22),{position:new THREE.Vector3(-2,-2,-3)}));
  const G=new THREE.Group(); scene.add(G);
  const U=1/16;
  function box(w,h,d,inf=0){
    const g=new THREE.BoxGeometry((w+inf*2)*U,(h+inf*2)*U,(d+inf*2)*U);
    return new THREE.Mesh(g,new THREE.MeshLambertMaterial({transparent:true,alphaTest:0.04}));
  }
  const M={};
  // Head center y=+16U, Body center y=+6U, Arms shoulder at y=+12U, Legs crotch at y=0
  M.head=box(8,8,8);    M.head.position.y=16*U;    G.add(M.head);
  M.hat=box(8,8,8,0.5); M.hat.position.y=16*U;     G.add(M.hat);
  M.body=box(8,12,4);   M.body.position.y=6*U;      G.add(M.body);
  M.jacket=box(8,12,4,0.5); M.jacket.position.y=6*U; G.add(M.jacket);
  function arm(side,inf=0){
    const piv=new THREE.Group(); piv.position.set(side*6*U,12*U,0);
    const m=box(4,12,4,inf); m.position.y=-6*U; piv.add(m); G.add(piv);
    return{piv,m};
  }
  function leg(side,inf=0){
    const piv=new THREE.Group(); piv.position.set(side*2*U,0,0);
    const m=box(4,12,4,inf); m.position.y=-6*U; piv.add(m); G.add(piv);
    return{piv,m};
  }
  const ra=arm(-1); M.rarm=ra.m; M.rAP=ra.piv;
  const la=arm(+1); M.larm=la.m; M.lAP=la.piv;
  M.rarm2=box(4,12,4,0.5); M.rarm2.position.y=-6*U; M.rAP.add(M.rarm2);
  M.larm2=box(4,12,4,0.5); M.larm2.position.y=-6*U; M.lAP.add(M.larm2);
  const rl=leg(-1); M.rleg=rl.m; M.rLP=rl.piv;
  const ll=leg(+1); M.lleg=ll.m; M.lLP=ll.piv;
  M.rleg2=box(4,12,4,0.5); M.rleg2.position.y=-6*U; M.rLP.add(M.rleg2);
  M.lleg2=box(4,12,4,0.5); M.lleg2.position.y=-6*U; M.lLP.add(M.lleg2);
  G.position.y=-4*U;

  let t=0;
  function idle(){t+=0.02;const w=Math.sin(t)*0.14;M.rAP.rotation.x=w;M.lAP.rotation.x=-w;M.rLP.rotation.x=-w;M.lLP.rotation.x=w;G.position.y=-4*U+Math.sin(t*.5)*.018;}

  let drag=false,pan=false,px=0,py=0,rotY=0.3,rotX=0.15,panX=0,panY=0,dist=5;
  c3.addEventListener('mousedown',e=>{if(e.button===0)drag=true;if(e.button===2)pan=true;px=e.clientX;py=e.clientY;});
  window.addEventListener('mouseup',()=>{drag=false;pan=false;});
  window.addEventListener('mousemove',e=>{
    const dx=e.clientX-px,dy=e.clientY-py;
    if(drag){rotY+=dx*.007;rotX+=dy*.007;rotX=Math.max(-1.3,Math.min(1.3,rotX));}
    if(pan){panX+=dx*.004;panY-=dy*.004;}
    px=e.clientX;py=e.clientY;
  });
  c3.addEventListener('wheel',e=>{dist=Math.max(2,Math.min(12,dist+e.deltaY*.005));});
  c3.addEventListener('contextmenu',e=>e.preventDefault());
  let ltd=0;
  c3.addEventListener('touchstart',e=>{if(e.touches.length===1){drag=true;px=e.touches[0].clientX;py=e.touches[0].clientY;}else ltd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);});
  c3.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1&&drag){rotY+=(e.touches[0].clientX-px)*.009;rotX+=(e.touches[0].clientY-py)*.009;px=e.touches[0].clientX;py=e.touches[0].clientY;}else if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);dist=Math.max(2,Math.min(12,dist-(d-ltd)*.02));ltd=d;}},{passive:false});
  c3.addEventListener('touchend',()=>drag=false);
  window.addEventListener('resize',()=>{const W2=cont.clientWidth,H2=cont.clientHeight;renderer.setSize(W2,H2);camera.aspect=W2/H2;camera.updateProjectionMatrix();});

  function loop(){
    if(S.mode!=='3d')return;
    requestAnimationFrame(loop);idle();
    camera.position.x=dist*Math.sin(rotY)*Math.cos(rotX)+panX;
    camera.position.y=dist*Math.sin(rotX)+panY;
    camera.position.z=dist*Math.cos(rotY)*Math.cos(rotX);
    camera.lookAt(panX,panY,0);
    renderer.render(scene,camera);
  }
  T={renderer,scene,camera,M,G,loop};
}

function uvApply(mesh,faces,tex){
  if(!mesh)return;
  const arr=mesh.geometry.attributes.uv.array;
  faces.forEach(([px,py,pw,ph],fi)=>{
    const b=fi*8,u0=px/64,u1=(px+pw)/64,v0=1-(py+ph)/64,v1=1-py/64;
    arr[b]=u0;arr[b+1]=v0;arr[b+2]=u1;arr[b+3]=v0;arr[b+4]=u0;arr[b+5]=v1;arr[b+6]=u1;arr[b+7]=v1;
  });
  mesh.geometry.attributes.uv.needsUpdate=true;
  mesh.material.map=tex;mesh.material.needsUpdate=true;
}

function update3D(){
  if(!T)return;
  const m2=getMerged();
  const sc=document.createElement('canvas');sc.width=64;sc.height=64;
  sc.getContext('2d').putImageData(m2,0,0);
  const tex=new THREE.CanvasTexture(sc);
  tex.magFilter=THREE.NearestFilter;tex.minFilter=THREE.NearestFilter;
  const M=T.M;
  uvApply(M.head,   [[16,8,8,8],[0,8,8,8],[8,0,8,8],[16,0,8,8],[8,8,8,8],[24,8,8,8]],tex);
  uvApply(M.hat,    [[48,8,8,8],[32,8,8,8],[40,0,8,8],[48,0,8,8],[40,8,8,8],[56,8,8,8]],tex);
  uvApply(M.body,   [[28,20,4,12],[16,20,4,12],[20,16,8,4],[28,16,8,4],[20,20,8,12],[32,20,8,12]],tex);
  uvApply(M.jacket, [[28,36,4,12],[16,36,4,12],[20,32,8,4],[28,32,8,4],[20,36,8,12],[32,36,8,12]],tex);
  uvApply(M.rarm,   [[48,20,4,12],[40,20,4,12],[44,16,4,4],[48,16,4,4],[44,20,4,12],[52,20,4,12]],tex);
  uvApply(M.rarm2,  [[48,36,4,12],[40,36,4,12],[44,32,4,4],[48,32,4,4],[44,36,4,12],[52,36,4,12]],tex);
  uvApply(M.larm,   [[40,52,4,12],[32,52,4,12],[36,48,4,4],[40,48,4,4],[36,52,4,12],[44,52,4,12]],tex);
  uvApply(M.larm2,  [[56,52,4,12],[48,52,4,12],[52,48,4,4],[56,48,4,4],[52,52,4,12],[60,52,4,12]],tex);
  uvApply(M.rleg,   [[8,20,4,12],[0,20,4,12],[4,16,4,4],[8,16,4,4],[4,20,4,12],[12,20,4,12]],tex);
  uvApply(M.rleg2,  [[8,36,4,12],[0,36,4,12],[4,32,4,4],[8,32,4,4],[4,36,4,12],[12,36,4,12]],tex);
  uvApply(M.lleg,   [[24,52,4,12],[16,52,4,12],[20,48,4,4],[24,48,4,4],[20,52,4,12],[28,52,4,12]],tex);
  uvApply(M.lleg2,  [[8,52,4,12],[0,52,4,12],[4,48,4,4],[8,48,4,4],[4,52,4,12],[12,52,4,12]],tex);
  PARTS.forEach(p=>{if(M[p.id])M[p.id].visible=S.vis[p.id]&&!!S.layers[p.id];});
}

// ════════════════════════════════════════
// MERGE
// ════════════════════════════════════════
function getMerged(){
  const out=new ImageData(64,64),d=out.data;
  PARTS.forEach(p=>{
    if(!S.vis[p.id])return;
    const L=S.layers[p.id];if(!L)return;
    const src=L.data;
    [p.uvF,p.uvB,p.uvT,p.uvBt,p.uvR,p.uvL].forEach(uv=>{
      if(!uv)return;
      const[ux,uy,uw,uh]=uv;
      for(let r=0;r<uh;r++)for(let c=0;c<uw;c++){
        const i=((uy+r)*64+(ux+c))*4;
        const sa=src[i+3];if(!sa)continue;
        const da=d[i+3],oa=sa+da*(1-sa/255);
        d[i]=(src[i]*sa/255+d[i]*(da/255)*(1-sa/255))/(oa/255||1);
        d[i+1]=(src[i+1]*sa/255+d[i+1]*(da/255)*(1-sa/255))/(oa/255||1);
        d[i+2]=(src[i+2]*sa/255+d[i+2]*(da/255)*(1-sa/255))/(oa/255||1);
        d[i+3]=oa;
      }
    });
  });
  return out;
}

// ════════════════════════════════════════
// 2D PREVIEW RENDER
// ════════════════════════════════════════
function exR(img,x,y,w,h){
  const rows=[],s=img.data;
  for(let r=0;r<h;r++){const row=[];for(let c=0;c<w;c++){const i=((y+r)*64+(x+c))*4;row.push([s[i],s[i+1],s[i+2],s[i+3]]);}rows.push(row);}
  return rows;
}
function dpx(ctx,px,dx,dy,sc,flip=false){
  const h=px.length,w=px[0]?.length||0;
  for(let r=0;r<h;r++)for(let c=0;c<w;c++){
    const sc2=flip?w-1-c:c;
    const[rr,gg,bb,aa]=px[r][sc2];if(aa<8)continue;
    ctx.fillStyle=`rgba(${rr},${gg},${bb},${aa/255})`;
    ctx.fillRect(dx+c*sc,dy+r*sc,sc,sc);
  }
}

function render2D(){
  const cv=document.getElementById('c2d');
  const ctx=cv.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  const any=Object.keys(S.layers).length>0;
  document.getElementById('empty').style.display=any?'none':'flex';
  if(!any){cv.width=10;cv.height=10;return;}
  const sc=S.scale,back=S.back;
  if(S.back===undefined||S.view==='uv'){/* skip */}
  const mg=sc*2;
  const hW=8,hH=8,bW=8,bH=12,aW=4,aH=12,lW=4,lH=12;
  cv.width=(aW+bW+aW)*sc+mg*2;
  cv.height=(hH+bH+lH)*sc+mg*2;
  ctx.clearRect(0,0,cv.width,cv.height);
  const m=getMerged();
  const headX=mg+aW*sc,headY=mg;
  const bodyX=mg+aW*sc,bodyY=headY+hH*sc;
  const rAX=mg,lAX=mg+(aW+bW)*sc,armY=bodyY;
  const rLX=mg+aW*sc,lLX=mg+(aW+lW)*sc,legY=bodyY+bH*sc;
  const pp={};
  if(!back){
    dpx(ctx,exR(m,8,8,8,8),headX,headY,sc);dpx(ctx,exR(m,40,8,8,8),headX,headY,sc);
    dpx(ctx,exR(m,20,20,8,12),bodyX,bodyY,sc);dpx(ctx,exR(m,20,36,8,12),bodyX,bodyY,sc);
    dpx(ctx,exR(m,44,20,4,12),rAX,armY,sc);dpx(ctx,exR(m,44,36,4,12),rAX,armY,sc);
    dpx(ctx,exR(m,36,52,4,12),lAX,armY,sc);dpx(ctx,exR(m,52,52,4,12),lAX,armY,sc);
    dpx(ctx,exR(m,4,20,4,12),rLX,legY,sc);dpx(ctx,exR(m,4,36,4,12),rLX,legY,sc);
    dpx(ctx,exR(m,20,52,4,12),lLX,legY,sc);dpx(ctx,exR(m,4,52,4,12),lLX,legY,sc);
    pp.head={x:headX,y:headY,w:hW*sc,h:hH*sc};pp.body={x:bodyX,y:bodyY,w:bW*sc,h:bH*sc};
    pp.rarm={x:rAX,y:armY,w:aW*sc,h:aH*sc};pp.larm={x:lAX,y:armY,w:aW*sc,h:aH*sc};
    pp.rleg={x:rLX,y:legY,w:lW*sc,h:lH*sc};pp.lleg={x:lLX,y:legY,w:lW*sc,h:lH*sc};
  } else {
    dpx(ctx,exR(m,24,8,8,8),headX,headY,sc,true);dpx(ctx,exR(m,56,8,8,8),headX,headY,sc,true);
    dpx(ctx,exR(m,32,20,8,12),bodyX,bodyY,sc,true);dpx(ctx,exR(m,32,36,8,12),bodyX,bodyY,sc,true);
    dpx(ctx,exR(m,52,20,4,12),rAX,armY,sc,true);dpx(ctx,exR(m,44,52,4,12),lAX,armY,sc,true);
    dpx(ctx,exR(m,12,20,4,12),rLX,legY,sc,true);dpx(ctx,exR(m,28,52,4,12),lLX,legY,sc,true);
  }
  if(S.grid){
    ctx.strokeStyle='rgba(68,184,160,.16)';ctx.lineWidth=.5;
    for(let x=0;x<=cv.width;x+=sc){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,cv.height);ctx.stroke();}
    for(let y=0;y<=cv.height;y+=sc){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cv.width,y);ctx.stroke();}
  }
  if(S.ovl&&!back){
    const oc={head:'#6bc070',body:'#44b8a0',rarm:'#f0a040',larm:'#f0a040',rleg:'#f0d040',lleg:'#f0d040'};
    Object.entries(pp).forEach(([id,pos])=>{ctx.strokeStyle=oc[id]||'#aaa';ctx.lineWidth=2;ctx.strokeRect(pos.x+1,pos.y+1,pos.w-2,pos.h-2);});
  }
  const bid=S.sel.replace('2','').replace('hat','head').replace('jacket','body');
  const sp=pp[S.sel]||pp[bid];
  if(sp&&!back){ctx.strokeStyle='rgba(68,184,160,.9)';ctx.lineWidth=2.5;ctx.setLineDash([4,3]);ctx.strokeRect(sp.x,sp.y,sp.w,sp.h);ctx.setLineDash([]);}
  cv._pp=pp;
}

// ════════════════════════════════════════
// PIXEL EDIT CANVAS (center, big)
// ════════════════════════════════════════
function getUVForFace(partId, face) {
  const p = PARTS.find(x=>x.id===partId);
  if(!p) return null;
  const prop = FACE_UV[face] || 'uvF';
  return p[prop] || p.uvF;
}

function renderEditCanvas(){
  const p=PARTS.find(x=>x.id===S.sel);
  if(!p) return;
  const uv=getUVForFace(S.sel, S.face);
  if(!uv) return;
  const [ux,uy,uw,uh]=uv;

  const cont=document.getElementById('cc');
  const cW=cont.clientWidth-20, cH=cont.clientHeight-20;
  // Fill the center area: compute pixel size
  const pxW=Math.floor(cW/uw);
  const pxH=Math.floor(cH/uh);
  const px=Math.max(6, Math.min(pxW, pxH, 40));  // pixel size

  const cv=document.getElementById('cEdit');
  cv.width=uw; cv.height=uh;
  cv.style.width=(uw*px)+'px';
  cv.style.height=(uh*px)+'px';

  // Update checker bg size
  const ech=document.getElementById('editChecker');
  ech.style.width=(uw*px)+'px';
  ech.style.height=(uh*px)+'px';

  // Store px size for mouse events
  cv._px=px; cv._uv=uv;

  const ctx=cv.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  ctx.clearRect(0,0,uw,uh);

  const L=S.layers[S.sel];
  if(!L) return;
  const src=L.data;
  for(let r=0;r<uh;r++) for(let c=0;c<uw;c++){
    const i=((uy+r)*64+(ux+c))*4;
    if(src[i+3]<8)continue;
    ctx.fillStyle=`rgba(${src[i]},${src[i+1]},${src[i+2]},${src[i+3]/255})`;
    ctx.fillRect(c,r,1,1);
  }

  // Grid overlay on edit canvas
  if(S.grid){
    ctx.strokeStyle='rgba(68,184,160,.3)'; ctx.lineWidth=0.1;
    for(let c=0;c<=uw;c++){ctx.beginPath();ctx.moveTo(c,0);ctx.lineTo(c,uh);ctx.stroke();}
    for(let r=0;r<=uh;r++){ctx.beginPath();ctx.moveTo(0,r);ctx.lineTo(uw,r);ctx.stroke();}
  }

  // Update face info
  document.getElementById('faceInfo').textContent=
    `${p.nm} ${S.face === 'front'?'앞':S.face==='back'?'뒤':S.face==='right'?'오른쪽':S.face==='left'?'왼쪽':S.face==='top'?'위':'아래'} (${uw}×${uh}px) | UV:[${ux},${uy}]`;
}

// Edit canvas mouse events
(()=>{
  const cv=document.getElementById('cEdit');

  function getPos(e){
    const uv=cv._uv; if(!uv) return null;
    const [,,uw,uh]=uv;
    const r=cv.getBoundingClientRect();
    const x=Math.floor((e.clientX-r.left)/r.width*uw);
    const y=Math.floor((e.clientY-r.top)/r.height*uh);
    return {x:Math.max(0,Math.min(uw-1,x)), y:Math.max(0,Math.min(uh-1,y))};
  }

  function paint(pos){
    const uv=cv._uv; if(!uv||!pos) return;
    const [ux,uy]=uv;
    ensureL(S.sel);
    const d=S.layers[S.sel].data;
    const i=((uy+pos.y)*64+(ux+pos.x))*4;
    if(S.tool==='erase'){d[i]=d[i+1]=d[i+2]=d[i+3]=0;}
    else if(S.tool==='pick'){
      if(d[i+3]>8){
        const h=`#${d[i].toString(16).padStart(2,'0')}${d[i+1].toString(16).padStart(2,'0')}${d[i+2].toString(16).padStart(2,'0')}`;
        setCol(h);
      }
      setTool('draw',document.getElementById('tb_draw')); return;
    } else {
      const h=curCol.replace('#','');
      d[i]=parseInt(h.slice(0,2),16);d[i+1]=parseInt(h.slice(2,4),16);
      d[i+2]=parseInt(h.slice(4,6),16);d[i+3]=255;
    }
  }

  function fill(pos){
    const uv=cv._uv; if(!uv||!pos) return;
    const [ux,uy,uw,uh]=uv;
    ensureL(S.sel);
    const d=S.layers[S.sel].data;
    const si=((uy+pos.y)*64+(ux+pos.x))*4;
    const [tr,tg,tb,ta]=[d[si],d[si+1],d[si+2],d[si+3]];
    const h=curCol.replace('#','');
    const [fr,fg,fb]=[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];
    if(tr===fr&&tg===fg&&tb===fb)return;
    const Q=[[pos.x,pos.y]],V=new Set();
    while(Q.length){
      const[cx,cy]=Q.shift();
      if(cx<0||cx>=uw||cy<0||cy>=uh)continue;
      const k=`${cx},${cy}`;if(V.has(k))continue;V.add(k);
      const idx=((uy+cy)*64+(ux+cx))*4;
      if(d[idx]!==tr||d[idx+1]!==tg||d[idx+2]!==tb||d[idx+3]!==ta)continue;
      d[idx]=fr;d[idx+1]=fg;d[idx+2]=fb;d[idx+3]=255;
      Q.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
    }
  }

  cv.addEventListener('mousedown',e=>{
    if(S.mode!=='edit')return;
    drawing=true; saveH();
    const pos=getPos(e);
    if(S.tool==='fill') fill(pos);
    else paint(pos);
    renderEditCanvas(); render2D(); updateAllThumbs();
    // Show coords
    if(pos) document.getElementById('pxInfo').textContent=`X:${pos.x} Y:${pos.y}`;
  });
  cv.addEventListener('mousemove',e=>{
    if(S.mode!=='edit'){return;}
    const pos=getPos(e);
    if(pos) document.getElementById('pxInfo').textContent=`X:${pos.x} Y:${pos.y}`;
    if(!drawing||S.tool==='fill')return;
    paint(pos);
    renderEditCanvas(); render2D(); updateAllThumbs();
  });
  cv.addEventListener('mouseleave',()=>{ document.getElementById('pxInfo').textContent=''; });
  window.addEventListener('mouseup',()=>drawing=false);
})();

  btn.classList.add('active');
  if(mode==='edit') btn.classList.add('edit-mode');

  const c2=document.getElementById('c2d');
  const cE=document.getElementById('cEdit');
  const c3=document.getElementById('c3d');

  c3.style.display='none'; faceBar.classList.remove('show');
  ech.classList.remove('show'); hint.classList.remove('on');

// ════════════════════════════════════════
// EDIT HELPERS
// ════════════════════════════════════════
function ensureL(id){if(!S.layers[id])S.layers[id]=new ImageData(64,64);}

function saveH(){
  const L=S.layers[S.sel];
  if(L){const cp=new ImageData(new Uint8ClampedArray(L.data),64,64);S.hist.push({id:S.sel,data:cp});if(S.hist.length>40)S.hist.shift();}
}

function undo(){
  const idx=S.hist.map((h,i)=>h.id===S.sel?i:-1).filter(i=>i>=0).pop();
  if(idx==null){toast('되돌릴 내용 없음');return;}
  S.layers[S.sel]=S.hist[idx].data;S.hist.splice(idx,1);
  renderEditCanvas();render2D();updateAllThumbs();toast('↩️ 되돌렸어요');
}

function flipH(){
  const uv=getUVForFace(S.sel,S.face);if(!uv)return;
  const[ux,uy,uw,uh]=uv;
  ensureL(S.sel);saveH();
  const d=S.layers[S.sel].data;
  for(let r=0;r<uh;r++) for(let c=0;c<Math.floor(uw/2);c++){
    const i1=((uy+r)*64+(ux+c))*4,i2=((uy+r)*64+(ux+uw-1-c))*4;
    for(let k=0;k<4;k++){const t=d[i1+k];d[i1+k]=d[i2+k];d[i2+k]=t;}
  }
  renderEditCanvas();render2D();toast('↔️ 좌우반전!');
}

function clearPart(){
  const uv=getUVForFace(S.sel,S.face);if(!uv)return;
  if(!S.layers[S.sel])return;
  saveH();
  const[ux,uy,uw,uh]=uv,d=S.layers[S.sel].data;
  for(let r=0;r<uh;r++) for(let c=0;c<uw;c++){const i=((uy+r)*64+(ux+c))*4;d[i]=d[i+1]=d[i+2]=d[i+3]=0;}
  renderEditCanvas();render2D();updateAllThumbs();toast('🧹 지웠어요');
}

// Keyboard shortcuts
window.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key==='p'||e.key==='P') setTool('draw',document.getElementById('tb_draw'));
  if(e.key==='f'||e.key==='F') setTool('fill',document.getElementById('tb_fill'));
  if(e.key==='e'||e.key==='E') setTool('erase',document.getElementById('tb_erase'));
  if(e.key==='i'||e.key==='I') setTool('pick',document.getElementById('tb_pick'));
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}
});

let PRESETS=JSON.parse(localStorage.getItem('si3_pres')||'[]');

function savePreset(){
  const p=PARTS.find(x=>x.id===S.sel);
  const uv=getUVForFace(S.sel,S.face);
  const L=S.layers[S.sel];
  if(!L||!uv){toast('편집 내용이 없어요');return;}
  const name=prompt('패턴 이름','내 패턴');if(!name)return;
  const[ux,uy,uw,uh]=uv,src=L.data;
  const pixels=[];
  for(let r=0;r<uh;r++){const row=[];for(let c=0;c<uw;c++){const i=((uy+r)*64+(ux+c))*4;row.push([src[i],src[i+1],src[i+2],src[i+3]]);}pixels.push(row);}
  PRESETS.push({id:Date.now(),name,partId:S.sel,face:S.face,w:uw,h:uh,pixels});
  localStorage.setItem('si3_pres',JSON.stringify(PRESETS));
  buildPresets();toast('⭐ 패턴 저장됨!');
}

function applyPreset(pr){
  const uv=getUVForFace(S.sel,S.face);if(!uv)return;
  const[ux,uy,uw,uh]=uv;
  ensureL(S.sel);saveH();
  const d=S.layers[S.sel].data;
  for(let r=0;r<uh;r++) for(let c=0;c<uw;c++){
    const pr2=Math.min(Math.floor(r*pr.h/uh),pr.h-1);
    const pc=Math.min(Math.floor(c*pr.w/uw),pr.w-1);
    const[rr,gg,bb,aa]=pr.pixels[pr2]?.[pc]||[0,0,0,0];
    const i=((uy+r)*64+(ux+c))*4;d[i]=rr;d[i+1]=gg;d[i+2]=bb;d[i+3]=aa;
  }
  renderEditCanvas();render2D();updateAllThumbs();toast('✅ 패턴 적용됨!');
}

function delPreset(id){PRESETS=PRESETS.filter(p=>p.id!==id);localStorage.setItem('si3_pres',JSON.stringify(PRESETS));buildPresets();toast('🗑️ 삭제됨');}

function buildPresets(){
  const g=document.getElementById('preGrid');
  if(!PRESETS.length){g.innerHTML='<div class="pr-empty">⭐ [패턴저장] 버튼으로<br>현재 면을 저장하세요!</div>';return;}
  g.innerHTML='';
  PRESETS.forEach(pr=>{
    const card=document.createElement('div');card.className='prc';
    const tw=Math.max(pr.w*3,24),th=Math.max(pr.h*3,24);
    const cv=document.createElement('canvas');cv.width=pr.w;cv.height=pr.h;cv.style.width=tw+'px';cv.style.height=th+'px';
    const ctx=cv.getContext('2d');
    pr.pixels.forEach((row,r)=>row.forEach(([rr,gg,bb,aa],c)=>{if(aa<8)return;ctx.fillStyle=`rgba(${rr},${gg},${bb},${aa/255})`;ctx.fillRect(c,r,1,1);}));
    const nm=document.createElement('div');nm.className='prc-nm';nm.textContent=pr.name;
    const del=document.createElement('button');del.className='prc-del';del.textContent='✕';
    del.onclick=e=>{e.stopPropagation();delPreset(pr.id);};
    card.append(cv,nm,del);card.onclick=()=>applyPreset(pr);g.appendChild(card);
  });
}

// AI GENERATION
// ════════════════════════════════════════
async function genAI(){
  const pmt=document.getElementById('aiPmt').value.trim();
  if(!pmt){toast('프롬프트를 입력해주세요!');return;}
  const tgt=document.getElementById('aiTgt').value;
  const btn=document.getElementById('aiBtn'),st=document.getElementById('aiSt');
  btn.disabled=true;btn.innerHTML='<span class="sp2"></span> 생성 중...';
  st.textContent='🎨 AI가 스킨 픽셀을 생성하고 있어요...';
  const tParts=tgt==='full'?PARTS:PARTS.filter(p=>p.id===tgt||p.id===tgt+'2');
  const partDesc=tParts.map(p=>`파츠ID:${p.id} uvF:[${p.uvF}] uvB:[${p.uvB}] uvT:[${p.uvT}] uvR:[${p.uvR}] uvL:[${p.uvL}] 크기:${p.w}×${p.h}`).join('\n');
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:2000,
        system:'마인크래프트 64×64 스킨 픽셀 생성 전문가. 순수 JSON만 반환. 마크다운 없음.',
        messages:[{role:'user',content:`디자인: "${pmt}"\n파츠:\n${partDesc}\n\n각 파츠 UV 영역에 픽셀 생성. 최대 600개. 투명(a=0) 제외.\n응답:{"pixels":[[x,y,r,g,b,255],...],"description":"설명"}`}]
      })
    });
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${res.status}`);}
    const data=await res.json();
    const raw=(data.content?.[0]?.text||'').replace(/^```[\w]*\n?/,'').replace(/\n?```$/,'').trim();
    const result=JSON.parse(raw);
    const pixels=result.pixels||[];
    if(!pixels.length)throw new Error('픽셀 데이터 없음');
    pixels.forEach(([x,y,r,g,b,a])=>{
      if(x<0||x>63||y<0||y>63)return;
      PARTS.forEach(p=>{
        [p.uvF,p.uvB,p.uvT,p.uvBt,p.uvR,p.uvL].filter(Boolean).forEach(([ux,uy,uw,uh])=>{
          if(x>=ux&&x<ux+uw&&y>=uy&&y<uy+uh){
            if(!S.layers[p.id]&&tParts.includes(p))ensureL(p.id);
            const L=S.layers[p.id];if(!L)return;
            const i=(y*64+x)*4;L.data[i]=r;L.data[i+1]=g;L.data[i+2]=b;L.data[i+3]=a||255;
          }
        });
      });
    });
    st.textContent=`✅ ${result.description||'완료!'} (${pixels.length}px)`;
    document.getElementById('empty').style.display='none';
    if(S.mode==='edit')renderEditCanvas();render2D();updateAllThumbs();toast('✨ AI 생성 완료!');
  }catch(e){
    st.textContent=`❌ ${e.message?.slice(0,70)||e}`;
    console.error('[AI]',e);toast('생성 실패. 콘솔 확인');
  }
  btn.disabled=false;btn.innerHTML='✨ 생성';
}

    el.innerHTML=`<span class="pi-ic">${p.ic}</span>
      <div class="pi-info"><div class="pi-nm">${p.nm}</div><div class="pi-sb" id="psb_${p.id}">클릭 편집</div></div>
      <button class="pi-vis" id="pvis_${p.id}" onclick="togV(event,'${p.id}')">👁</button>`;
    el.onclick=e=>{if(!e.target.classList.contains('pi-vis'))selP(p.id);};list.appendChild(el);
  });
  const bG=document.getElementById('thBase'),oG=document.getElementById('thOvl');
  bG.innerHTML='';oG.innerHTML='';
  PARTS.forEach(p=>{
    const tw=Math.max(p.w*3,28),th=Math.max(p.h*3,28);
    const card=document.createElement('div');card.className='tc'+(p.ov?' ovl':'');card.id='tc_'+p.id;card.onclick=()=>selP(p.id);
    card.innerHTML=`<canvas id="tc_cv_${p.id}" width="${p.w}" height="${p.h}" style="width:${tw}px;height:${th}px"></canvas>
      <div class="tc-nm">${p.ic} ${p.nm}</div>
      <div class="tc-b no" id="tcb_${p.id}">비어있음</div>`;
    (p.ov?oG:bG).appendChild(card);
  });
}

function selP(id){
  S.sel=id;
  document.querySelectorAll('.pi').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tc').forEach(e=>e.classList.remove('active'));
  document.getElementById('pi_'+id)?.classList.add('active');
  document.getElementById('tc_'+id)?.classList.add('active');
  if(S.mode==='edit'){renderEditCanvas();}
  else if(S.mode==='preview'){render2D();}
  const p=PARTS.find(x=>x.id===id);
  toast(`${p.ic} ${p.nm} 선택됨`);
}

function togV(e,id){
  e.stopPropagation();S.vis[id]=!S.vis[id];
  document.getElementById('pvis_'+id)?.classList.toggle('off',!S.vis[id]);
  if(S.mode==='3d')update3D();else render2D();
}

// Click preview to select+switch to edit
document.getElementById('c2d').addEventListener('click',e=>{
  if(S.mode!=='preview')return;
  const cv=document.getElementById('c2d'),pp=cv._pp;if(!pp)return;
  const r=cv.getBoundingClientRect(),cx=e.clientX-r.left,cy=e.clientY-r.top;
  for(const[id,pos]of Object.entries(pp)){
    if(cx>=pos.x&&cx<pos.x+pos.w&&cy>=pos.y&&cy<pos.y+pos.h){
      selP(id);
      // Switch to edit mode
      setMode('edit',document.getElementById('vbEdit'));
      toast(`✏️ ${PARTS.find(p=>p.id===id).nm} 편집 모드`);
      break;
    }
  }
});

// ════════════════════════════════════════
// THUMBNAILS
// ════════════════════════════════════════
function updateThumb(id){
  const p=PARTS.find(x=>x.id===id),L=S.layers[id];
  const tc=document.getElementById('tc_'+id),bdg=document.getElementById('tcb_'+id);
  const cv=document.getElementById('tc_cv_'+id);if(!cv)return;
  const ctx=cv.getContext('2d');ctx.imageSmoothingEnabled=false;ctx.clearRect(0,0,cv.width,cv.height);
  if(!L){tc?.classList.remove('has-d');if(bdg){bdg.textContent='비어있음';bdg.className='tc-b no';}document.getElementById('psb_'+id).textContent='클릭 편집';document.getElementById('pi_'+id)?.classList.remove('has-d');return;}
  const[ux,uy,uw,uh]=p.uvF,src=L.data;
  for(let r=0;r<uh;r++)for(let c=0;c<uw;c++){const i=((uy+r)*64+(ux+c))*4;if(src[i+3]<8)continue;ctx.fillStyle=`rgba(${src[i]},${src[i+1]},${src[i+2]},${src[i+3]/255})`;ctx.fillRect(c,r,1,1);}
  tc?.classList.add('has-d');if(bdg){bdg.textContent='로드됨';bdg.className='tc-b ok';}
  document.getElementById('psb_'+id).textContent='✅ 로드됨';document.getElementById('pi_'+id)?.classList.add('has-d');
}
function updateAllThumbs(){PARTS.forEach(p=>updateThumb(p.id));document.getElementById('sparts').textContent=`파츠 ${PARTS.filter(p=>S.layers[p.id]).length}/12`;}

// ════════════════════════════════════════
// FILE I/O
// ════════════════════════════════════════
function loadFull(input){
  const f=input.files[0];if(!f)return;
  const fr=new FileReader();
  fr.onload=e=>{
    const img=new Image();img.onload=()=>{
      const c=document.createElement('canvas');c.width=64;c.height=64;c.getContext('2d').drawImage(img,0,0,64,64);
      const raw=c.getContext('2d').getImageData(0,0,64,64);
      PARTS.forEach(p=>{S.layers[p.id]=new ImageData(new Uint8ClampedArray(raw.data),64,64);});
      document.getElementById('fuOk').textContent='✅ '+f.name;document.getElementById('fuOk').style.display='block';
      document.getElementById('empty').style.display='none';S.hist=[];
      if(S.mode==='edit')renderEditCanvas();render2D();updateAllThumbs();toast('📂 '+f.name);setSt('로드됨: '+f.name,true);
    };img.src=e.target.result;
  };fr.readAsDataURL(f);input.value='';
}

function dlFull(){
  if(!Object.keys(S.layers).length){toast('스킨을 업로드하거나 생성하세요');return;}
  const m=getMerged(),c=document.createElement('canvas');c.width=64;c.height=64;
  c.getContext('2d').putImageData(m,0,0);
  const a=document.createElement('a');a.download='merged_skin.png';a.href=c.toDataURL('image/png');a.click();
  toast('💾 저장됐어요!');
}

function dlParts(){
  const ld=PARTS.filter(p=>S.layers[p.id]);if(!ld.length){toast('저장할 파츠 없음');return;}
  ld.forEach((p,i)=>setTimeout(()=>{
    const[ux,uy,uw,uh]=p.uvF,src=S.layers[p.id].data;
    const c=document.createElement('canvas');c.width=uw;c.height=uh;const ctx=c.getContext('2d');
    for(let r=0;r<uh;r++)for(let cc=0;cc<uw;cc++){const idx=((uy+r)*64+(ux+cc))*4;if(src[idx+3]<8)continue;ctx.fillStyle=`rgba(${src[idx]},${src[idx+1]},${src[idx+2]},${src[idx+3]/255})`;ctx.fillRect(cc,r,1,1);}
    const a=document.createElement('a');a.download=`part_${p.id}.png`;a.href=c.toDataURL('image/png');a.click();
  },i*200));toast(`📦 ${ld.length}개 파츠!`);
}

function dlView(){
  const cv=S.mode==='3d'?document.getElementById('c3d'):S.mode==='edit'?document.getElementById('cEdit'):document.getElementById('c2d');
  const a=document.createElement('a');a.download='preview.png';a.href=cv.toDataURL('image/png');a.click();toast('📷 캡처됐어요!');
}

function resetAll(){
  if(!confirm('초기화할까요?'))return;
  S.layers={};S.hist=[];document.getElementById('fuOk').style.display='none';
  if(S.mode==='edit')renderEditCanvas();render2D();updateAllThumbs();toast('🔄 초기화됐어요');setSt('초기화 완료',false);
}

function setSt(msg,ok){document.getElementById('stxt').textContent=msg;document.getElementById('sdot').className='sdot'+(ok?' g':'');}
let _t;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');clearTimeout(_t);_t=setTimeout(()=>el.classList.remove('on'),2300);}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
buildUI();buildPal();buildPresets();setCol('#FFB3C1');selP('head');render2D();
</script>
